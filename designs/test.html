<header class="bg-[#131314] backdrop-blur-xl bg-opacity-80 fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 w-full">

<h1 class="text-2xl font-black tracking-tighter text-[#0F766E] font-['Manrope']">Bac IA</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center ghost-border">

</div>

<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<!-- Small floating nodes -->
<div class="absolute -top-4 -right-4 w-4 h-4 bg-primary rounded-full blur-[2px]"></div>
<div class="absolute -bottom-8 -left-2 w-3 h-3 bg-primary-container rounded-full blur-[1px]"></div>
<div class="absolute top-12 -left-12 w-2 h-2 bg-secondary rounded-full opacity-50"></div>
</div>
</div>

</div>
</div>

<h2 class="text-2xl font-bold font-['Manrope'] tracking-tight text-on-surface">Exercices</h2>
<p class="text-on-surface-variant font-['Inter'] leading-relaxed opacity-80 tracking-wide">
                Aucun exercice généré pour le moment.
            </p>
</div>

<div class="mt-12">
<button class="premium-gradient text-on-primary-fixed font-bold px-8 py-4 rounded-xl shadow-2xl transition-transform active:scale-95 duration-300">
                Générer mon premier exercice
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-white/5 backdrop-blur-2xl rounded-t-2xl shadow-[0_-8px_32px_rgba(0,0,0,0.3)]">
