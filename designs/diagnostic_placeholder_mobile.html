<!DOCTYPE html>
<html class="dark" lang="fr" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>Bac IA - Diagnostic</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#80d5cb",
                        "primary-container": "#0f766e",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "on-surface-variant": "#bdc9c6"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131314; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-gradient { background: linear-gradient(135deg, #0f766e 0%, #80d5cb 100%); }
    </style>
</head>
<body class="text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
    <header class="p-6 pt-12">
        <h1 class="font-headline font-bold text-lg tracking-tight text-primary text-center">Bac IA</h1>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-8">
        <div class="w-full text-center">
            <div class="w-20 h-20 bg-primary-container/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-primary/30">
                <span class="material-symbols-outlined text-primary text-4xl">rocket_launch</span>
            </div>
            <h2 class="text-3xl font-headline font-bold mb-3">Ton diagnostic arrive bientôt</h2>
            <p class="text-on-surface-variant text-sm mb-10 leading-relaxed">Cet écran sera disponible dans le Lot 2. Le tuteur analysera tes lacunes pour te proposer un plan de révision sur mesure.</p>
            
            <div class="space-y-4">
                <a href="chat_mobile.html" class="premium-gradient text-[#003733] w-full py-4 rounded-2xl font-bold text-lg text-center block shadow-lg shadow-primary/20 transition-all">
                    Accéder au tuteur
                </a>
                <a href="onboarding_5_matieres_mobile.html" class="glass w-full py-4 rounded-2xl font-bold text-lg text-center block hover:bg-white/5 transition-all">
                    Modifier mes matières
                </a>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-on-surface-variant/40 text-[10px] uppercase tracking-widest">
        &copy; 2024 Bac IA
    </footer>
</body>
</html>
