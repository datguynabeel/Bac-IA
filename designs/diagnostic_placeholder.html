<!DOCTYPE html>
<html class="dark" lang="fr" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bac IA - Diagnostic</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#80d5cb",
                        "primary-container": "#0f766e",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "on-surface-variant": "#bdc9c6"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131314; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-gradient { background: linear-gradient(135deg, #0f766e 0%, #80d5cb 100%); }
    </style>
</head>
<body class="text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
    <header class="p-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">auto_awesome</span>
            <span class="font-headline font-bold text-xl tracking-tight text-primary">Bac IA</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-8 py-12">
        <div class="max-w-2xl w-full text-center">
            <div class="w-24 h-24 bg-primary-container/20 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-primary/30">
                <span class="material-symbols-outlined text-primary text-5xl">rocket_launch</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-headline font-bold mb-4">Ton diagnostic arrive bientôt</h1>
            <p class="text-on-surface-variant text-xl mb-12">Cet écran sera disponible dans le Lot 2. Le tuteur analysera tes lacunes pour te proposer un plan de révision sur mesure.</p>
            
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a href="chat.html" class="premium-gradient text-[#003733] px-8 py-4 rounded-2xl font-bold text-lg shadow-xl shadow-primary/20 hover:scale-105 transition-all">
                    Accéder au tuteur en attendant
                </a>
                <a href="onboarding_5_matieres.html" class="glass px-8 py-4 rounded-2xl font-bold text-lg hover:bg-white/5 transition-all">
                    Modifier mes matières
                </a>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-on-surface-variant/40 text-xs">
        &copy; 2024 Bac IA. Tous droits réservés.
    </footer>
</body>
</html>
