            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="font-body selection:bg-primary/30 min-h-screen flex flex-col items-center">
<!-- TopAppBar Shell Component (JSON Derived) -->
<header class="fixed top-0 w-full z-50 bg-[#131314]/80 dark:bg-zinc-950/80 backdrop-blur-lg no-border transition-colors duration-300 bg-surface-container-low shadow-[0_8px_32px_rgba(0,0,0,0.2)] border-b border-white/5">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-5xl mx-auto">
<button class="scale-95 active:scale-90 transition-transform flex items-center justify-center p-2 rounded-full hover:bg-white/5 transition-all duration-300 text-zinc-500 hover:text-zinc-300">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-['Manrope'] tracking-tight font-bold text-lg text-teal-600 dark:text-teal-400 font-extrabold tracking-tighter">Bac IA</h1>
<button class="scale-95 active:scale-90 transition-transform text-zinc-500 hover:text-zinc-300 font-bold hover:bg-white/5 px-4 py-2 rounded-lg transition-all duration-300">
                Aide
            </button>
</div>
</header>
<!-- Main Onboarding Canvas -->
<main class="flex-1 w-full max-w-2xl px-6 pt-32 pb-24 flex flex-col">
<!-- Progress Bar Section -->
<div class="w-full mb-16">
<div class="flex justify-between items-center mb-3">
<span class="text-xs font-semibold tracking-widest uppercase text-on-surface-variant/60">Étape 1 sur 5</span>
<span class="text-xs font-bold text-primary">20%</span>
</div>
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/5 transition-all duration-500 ease-out"></div>
</div>
</div>
<!-- Question Section (Editorial Typography) -->
<div class="mb-12">
<h2 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tight text-on-surface leading-tight">
                Qui es-tu ?
            </h2>
<p class="text-on-surface-variant mt-4 text-lg max-w-md">
                Personnalisez votre expérience pour obtenir les meilleurs résultats.
            </p>
</div>
<!-- Interaction Cards: Superhuman-inspired Tonal Layering -->
<div class="space-y-4">
<!-- Option 1: Student -->
<div class="group relative cursor-pointer active-selection rounded-xl overflow-hidden transition-all duration-300">
<div class="flex items-center min-h-[140px] p-8 glass-panel ghost-border rounded-xl group-hover:bg-white/10 transition-all duration-300">
<div class="h-14 w-14 rounded-xl bg-primary-container/20 flex items-center justify-center mr-6">
<span class="material-symbols-outlined text-primary text-3xl">school</span>
</div>
<div>
<h3 class="font-headline text-xl font-bold text-on-surface">Je suis élève</h3>
<p class="text-on-surface-variant text-sm mt-1">Je veux réviser mon Bac</p>
</div>
<div class="ml-auto opacity-100">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Option 2: Parent -->
<div class="group relative cursor-pointer rounded-xl overflow-hidden transition-all duration-300">
<div class="flex items-center min-h-[140px] p-8 glass-panel ghost-border rounded-xl group-hover:bg-white/10 transition-all duration-300">
<div class="h-14 w-14 rounded-xl bg-surface-container-highest flex items-center justify-center mr-6">
<span class="material-symbols-outlined text-on-surface-variant text-3xl">shield</span>
</div>
<div>
<h3 class="font-headline text-xl font-bold text-on-surface">Je suis parent</h3>
<p class="text-on-surface-variant text-sm mt-1">Je veux suivre la progression de mon enfant</p>
</div>
<div class="ml-auto opacity-0 group-hover:opacity-30 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant">circle</span>
</div>
</div>
</div>
</div>
<!-- Bottom Action Bar (Fixed or Floating depending on screen size) -->
<div class="mt-auto pt-16 flex flex-col items-center">
<button class="w-full max-w-xs h-14 rounded-xl bg-primary-container/20 text-on-surface/30 font-bold text-lg cursor-not-allowed transition-all duration-300 flex items-center justify-center gap-2" disabled="">
                Suivant
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<p class="mt-6 text-sm text-on-surface-variant/40 font-medium">

            </p>
</div>

<div class="fixed top-0 right-0 -z-10 w-1/2 h-1/2 bg-primary/5 blur-[120px] rounded-full translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
