<!DOCTYPE html>
<html class="dark" lang="fr" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bac IA - Onboarding 1/5</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#80d5cb",
                        "primary-container": "#0f766e",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "on-surface-variant": "#bdc9c6",
                        "surface-container-lowest": "#0e0e0f"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131314; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
    <script src="app.js"></script>
</head>
<body class="text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
    <!-- Header Onboarding -->
    <header class="p-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">auto_awesome</span>
            <span class="font-headline font-bold text-lg tracking-tight text-primary">Bac IA</span>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40 mb-1">Étape 1 sur 5</span>
            <div class="w-32 h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div class="w-1/5 h-full bg-primary rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-8 py-12">
        <div class="max-w-4xl w-full">
            <h1 class="text-4xl md:text-5xl font-headline font-bold mb-12 text-center">Tu es...</h1>
            
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Card Élève -->
                <div onclick="BacIA.save(BacIA.KEYS.ROLE, 'student'); BacIA.navigate('onboarding_2_niveau.html')" class="glass p-10 rounded-[40px] text-center group hover:border-primary/50 hover:bg-white/5 transition-all cursor-pointer flex flex-col items-center">
                    <div class="w-24 h-24 bg-primary-container rounded-3xl flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-primary text-5xl">school</span>
                    </div>
                    <h2 class="text-3xl font-bold mb-3">Un élève</h2>
                    <p class="text-on-surface-variant text-lg">Je révise pour le Bac</p>
                </div>

                <!-- Card Parent -->
                <div onclick="BacIA.save(BacIA.KEYS.ROLE, 'parent'); BacIA.navigate('dashboard_parent.html')" class="glass p-10 rounded-[40px] text-center group hover:border-primary/50 hover:bg-white/5 transition-all cursor-pointer flex flex-col items-center">
                    <div class="w-24 h-24 bg-primary-container rounded-3xl flex items-center justify-center mx-auto mb-8 group-hover:scale-110 transition-transform">
                        <span class="material-symbols-outlined text-primary text-5xl">family_restroom</span>
                    </div>
                    <h2 class="text-3xl font-bold mb-3">Un parent</h2>
                    <p class="text-on-surface-variant text-lg">J'inscris mon enfant</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center">
        <a href="landing.html" class="text-on-surface-variant hover:text-primary transition-colors text-sm font-medium">Retour à l'accueil</a>
    </footer>
</body>
</html>
