<!DOCTYPE html>
<html class="dark" lang="fr" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bac IA - Onboarding 2/5</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#80d5cb",
                        "primary-container": "#0f766e",
                        "background": "#131314",
                        "on-surface": "#e5e2e3",
                        "on-surface-variant": "#bdc9c6",
                        "surface-container-lowest": "#0e0e0f",
                        "surface-container-high": "#2a2a2b"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #131314; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .selected-card { border-color: #80d5cb !important; background: rgba(128, 213, 203, 0.05) !important; }
        .premium-gradient { background: linear-gradient(135deg, #0f766e 0%, #80d5cb 100%); }
    </style>
        <script src="app.js"></script>
</head>
<body class="text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col">
    <!-- Header Onboarding -->
    <header class="p-8 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <a href="onboarding_1_role.html" class="p-2 hover:bg-white/5 rounded-full transition-colors">
                <span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
            </a>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">auto_awesome</span>
                <span class="font-headline font-bold text-xl tracking-tight text-primary">Bac IA</span>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40 mb-1">Étape 2 sur 5</span>
            <div class="w-32 h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div class="w-2/5 h-full bg-primary rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-8 py-12">
        <div class="max-w-2xl w-full">
            <h1 class="text-4xl font-headline font-bold mb-12 text-center">Tu es en quelle classe ?</h1>
            
            <div class="space-y-4 mb-12">
                <!-- Option 1 -->
                <div onclick="select(this)" class="glass p-8 rounded-[32px] flex justify-between items-center cursor-pointer group hover:border-white/20 transition-all border border-white/5">
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center group-hover:bg-primary/10 group-hover:text-primary transition-colors">
                            <span class="material-symbols-outlined">filter_1</span>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold mb-1">Tronc Commun</h2>
                            <p class="text-sm text-on-surface-variant">1ère année du lycée</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-primary opacity-0 check-icon">check_circle</span>
                </div>

                <!-- Option 2 -->
                <div onclick="select(this)" class="glass p-8 rounded-[32px] flex justify-between items-center cursor-pointer group hover:border-white/20 transition-all border border-white/5">
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center group-hover:bg-primary/10 group-hover:text-primary transition-colors">
                            <span class="material-symbols-outlined">filter_2</span>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold mb-1">1ère année Bac</h2>
                            <p class="text-sm text-on-surface-variant">Avant l'année du Bac</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-primary opacity-0 check-icon">check_circle</span>
                </div>

                <!-- Option 3 -->
                <div onclick="select(this)" class="glass p-8 rounded-[32px] flex justify-between items-center cursor-pointer group hover:border-white/20 transition-all border border-white/5">
                    <div class="flex items-center gap-6">
                        <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center group-hover:bg-primary/10 group-hover:text-primary transition-colors">
                            <span class="material-symbols-outlined">school</span>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold mb-1">2ème année Bac</h2>
                            <p class="text-sm text-on-surface-variant">L'année du Bac National</p>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-primary opacity-0 check-icon">check_circle</span>
                </div>
            </div>

            <a id="btn-continue" href="onboarding_3_filiere.html" class="opacity-30 pointer-events-none premium-gradient text-[#003733] w-full py-5 rounded-2xl font-bold text-xl text-center block shadow-xl shadow-primary/20 transition-all">
                Continuer
            </a>
        </div>
    </main>

    <script>
        function select(el) {
            document.querySelectorAll('.glass').forEach(card => {
                card.classList.remove('selected-card');
                card.querySelector('.check-icon').classList.add('opacity-0');
            });
            el.classList.add('selected-card');
            el.querySelector('.check-icon').classList.remove('opacity-0');
            
            const btn = document.getElementById('btn-continue');
            btn.classList.remove('opacity-30', 'pointer-events-none');
        }
    </script>
</body>
</html>
