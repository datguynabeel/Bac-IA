<!DOCTYPE html>
<html>
<head>
    <title>Bac IA - Chargement...</title>
    <script>
        // Détection mobile simple pour rediriger vers la bonne version
        function redirect() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
            if (isMobile) {
                window.location.href = "designs/landing_mobile.html";
            } else {
                window.location.href = "designs/landing.html";
            }
        }
        redirect();
    </script>
</head>
<body style="background: #131314; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;">
    <div style="text-align: center;">
        <div style="border: 3px solid rgba(128, 213, 203, 0.1); border-top: 3px solid #80d5cb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
        <p style="letter-spacing: 0.1em; font-size: 12px; font-weight: bold; color: #80d5cb;">BAC IA</p>
    </div>
    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
