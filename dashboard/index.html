<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bac IA — Dashboard Fondateur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0e1a;
      --bg-mid: #0f1424;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --glass-border-strong: rgba(255,255,255,0.14);
      --text-primary: #f5f7fa;
      --text-secondary: #a8b1c2;
      --text-muted: #6b7488;
      --accent-green: #10b981;
      --accent-amber: #f59e0b;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
      --radius-card: 16px;
      --radius-pill: 999px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:radial-gradient(ellipse at top left,#1a1f3a 0%,var(--bg-deep) 60%);color:var(--text-primary);min-height:100vh;padding:32px 24px 80px;line-height:1.5;-webkit-font-smoothing:antialiased}
    .container{max-width:1280px;margin:0 auto}
    header{margin-bottom:32px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
    h1{font-size:28px;font-weight:800;letter-spacing:-0.02em}
    h1 .accent{background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .meta-info{font-size:13px;color:var(--text-muted);text-align:right}
    .meta-info span{display:block}
    .grid{display:grid;gap:20px;grid-template-columns:repeat(12,1fr)}
    .card{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius-card);padding:24px;transition:border-color .2s ease}
    .card:hover{border-color:var(--glass-border-strong)}
    .card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-title .icon{font-size:16px}
    .col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}
    @media(max-width:900px){.col-8,.col-6,.col-4{grid-column:span 12}}
    .pulse-content{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
    .pulse-dot{width:14px;height:14px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 12px var(--accent-green);animation:pulse 2s ease-in-out infinite}
    .pulse-dot.amber{background:var(--accent-amber);box-shadow:0 0 12px var(--accent-amber)}
    .pulse-dot.red{background:var(--accent-red);box-shadow:0 0 12px var(--accent-red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .pulse-phase{font-size:18px;font-weight:700}
    .pulse-label{font-size:14px;color:var(--text-secondary)}
    .pulse-target{margin-left:auto;padding:8px 14px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);border-radius:var(--radius-pill);font-size:13px;font-weight:600;color:#93c5fd}
    .jalon{padding:16px 0;border-bottom:1px solid var(--glass-border)}.jalon:last-child{border-bottom:none}
    .jalon-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
    .jalon-label{font-weight:600;font-size:14px}
    .jalon-statut{font-size:11px;padding:3px 10px;border-radius:var(--radius-pill);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .statut-en_cours{background:rgba(245,158,11,.15);color:var(--accent-amber)}
    .statut-a_venir{background:rgba(168,85,247,.12);color:#c4b5fd}
    .statut-fait{background:rgba(16,185,129,.15);color:var(--accent-green)}
    .progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:var(--radius-pill);overflow:hidden;margin-bottom:10px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple));border-radius:var(--radius-pill);transition:width .6s ease}
    .jalon-items{display:flex;flex-direction:column;gap:4px;margin-top:8px}
    .jalon-item{font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
    .jalon-item.fait{color:var(--text-muted);text-decoration:line-through}
    .jalon-item .check{color:var(--accent-green)}.jalon-item .pending{color:var(--text-muted)}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}
    .kpi{padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--glass-border);border-radius:12px}
    .kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .kpi-value{font-size:24px;font-weight:700}
    .kpi-cible{font-size:12px;color:var(--text-muted);margin-top:2px}
    .kpi-cible .sep{opacity:.5;margin:0 4px}
    .timeline{display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto;padding-right:4px}
    .timeline::-webkit-scrollbar{width:6px}.timeline::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:3px}
    .decision{display:flex;gap:12px;padding:10px 12px;background:rgba(255,255,255,.02);border-left:2px solid var(--accent-blue);border-radius:6px}
    .decision-date{font-size:11px;color:var(--text-muted);white-space:nowrap;font-variant-numeric:tabular-nums;min-width:110px}
    .decision-label{font-size:13px;color:var(--text-primary)}
    .next-action{padding:18px;background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(168,85,247,.08));border:1px solid rgba(59,130,246,.25);border-radius:12px}
    .next-action-label{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:12px}
    .next-action-meta{display:flex;gap:16px;font-size:12px;color:var(--text-secondary);flex-wrap:wrap}
    .next-action-meta strong{color:var(--text-primary)}
    .empty{font-size:13px;color:var(--text-muted);font-style:italic;padding:8px 0}
    .bloquant{padding:10px 12px;background:rgba(239,68,68,.08);border-left:2px solid var(--accent-red);border-radius:6px;font-size:13px;margin-bottom:8px}
    .cadence-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--glass-border)}
    .cadence-row:last-child{border-bottom:none}
    .cadence-label{color:var(--text-secondary)}.cadence-value{font-weight:600;font-variant-numeric:tabular-nums}
    .cadence-pct{font-size:32px;font-weight:800;text-align:center;padding:12px 0}
    .cadence-pct.green{color:var(--accent-green)}.cadence-pct.amber{color:var(--accent-amber)}.cadence-pct.red{color:var(--accent-red)}
    .error{color:var(--accent-red);padding:24px;text-align:center;font-size:14px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="accent">Bac IA</span> — Dashboard Fondateur</h1>
      <div class="meta-info" id="meta-info"></div>
    </header>
    <div id="dashboard-root">
      <div class="card"><div class="card-title">Chargement…</div></div>
    </div>
  </div>
  <script>
async function loadDashboard(){
  try{
    const res=await fetch('/dashboard/status.json?t='+Date.now());
    if(!res.ok)throw new Error('status.json introuvable');
    const data=await res.json();
    renderMeta(data.meta);
    renderDashboard(data);
  }catch(e){
    document.getElementById('dashboard-root').innerHTML='<div class="card error">Erreur de chargement : '+e.message+'</div>';
  }
}
function renderMeta(meta){
  const date=new Date(meta.last_updated).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('meta-info').innerHTML=`<span>Dernière MAJ : <strong>${date}</strong></span><span>Doc maître v${meta.doc_master_version} · ${meta.lessons_count} leçons</span>`;
}
function renderDashboard(d){
  document.getElementById('dashboard-root').innerHTML=`<div class="grid">${renderPulse(d.pulse)}${renderJalons(d.jalons)}${renderKpis(d.kpis)}${renderNextAction(d.prochaine_action)}${renderDecisions(d.decisions_actees)}${renderBloquants(d.bloquants)}${renderCadence(d.cadence)}</div>`;
}
function renderPulse(p){
  const cls=p.sante_globale==='vert'?'':(p.sante_globale==='amber'?'amber':'red');
  return `<div class="card col-12"><div class="card-title"><span class="icon">🟢</span>Pulse global</div><div class="pulse-content"><div class="pulse-dot ${cls}"></div><div><div class="pulse-phase">${p.phase_actuelle}</div><div class="pulse-label">${p.sante_label}</div></div><div class="pulse-target">🎯 ${p.time_to_first_revenue_target}</div></div></div>`;
}
function renderJalons(jalons){
  const items=jalons.map(j=>`<div class="jalon"><div class="jalon-header"><div class="jalon-label">${j.label}</div><div class="jalon-statut statut-${j.statut}">${j.statut.replace('_',' ')}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${j.progression_pct}%"></div></div><div class="jalon-items">${j.items.map(it=>`<div class="jalon-item ${it.fait?'fait':''}"><span class="${it.fait?'check':'pending'}">${it.fait?'✓':'○'}</span><span>${it.label}</span></div>`).join('')}</div></div>`).join('');
  return `<div class="card col-8"><div class="card-title"><span class="icon">🎯</span>Avancement par jalon</div>${items}</div>`;
}
function renderKpis(kpis){
  const items=kpis.map(k=>{
    const cible=k.cible!==null?`<div class="kpi-cible">cible<span class="sep">·</span><strong>${k.cible}${k.unite?' '+k.unite:''}</strong></div>`:'<div class="kpi-cible">&nbsp;</div>';
    return `<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.valeur}${k.unite?' '+k.unite:''}</div>${cible}</div>`;
  }).join('');
  return `<div class="card col-4"><div class="card-title"><span class="icon">📊</span>KPIs vivants</div><div class="kpi-grid">${items}</div></div>`;
}
function renderNextAction(a){
  return `<div class="card col-6"><div class="card-title"><span class="icon">⚡</span>Prochaine action immédiate</div><div class="next-action"><div class="next-action-label">${a.label}</div><div class="next-action-meta"><span>Deadline <strong>${a.deadline}</strong></span><span>Owner <strong>${a.owner}</strong></span></div></div></div>`;
}
function renderDecisions(decisions){
  const items=decisions.slice().reverse().map(d=>`<div class="decision"><div class="decision-date">${d.date}</div><div class="decision-label">${d.label}</div></div>`).join('');
  return `<div class="card col-6"><div class="card-title"><span class="icon">🧭</span>Décisions clés actées</div><div class="timeline">${items}</div></div>`;
}
function renderBloquants(bloquants){
  const content=bloquants.length?bloquants.map(b=>`<div class="bloquant">${b}</div>`).join(''):'<div class="empty">Aucun bloquant identifié.</div>';
  return `<div class="card col-6"><div class="card-title"><span class="icon">🚧</span>Bloquants</div>${content}</div>`;
}
function renderCadence(c){
  const cls=c.respect_pct>=80?'green':(c.respect_pct>=60?'amber':'red');
  return `<div class="card col-6"><div class="card-title"><span class="icon">📅</span>Cadence respectée</div><div class="cadence-pct ${cls}">${c.respect_pct}%</div><div class="cadence-row"><span class="cadence-label">Sessions tenues / planifiées</span><span class="cadence-value">${c.sessions_tenues_semaine} / ${c.sessions_planifiees_semaine}</span></div><div class="cadence-row"><span class="cadence-label">Patches Antigravity (semaine)</span><span class="cadence-value">${c.patches_antigravity_semaine}</span></div></div>`;
}
loadDashboard();
  </script>
</body>
</html>
